<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEREBRUM — Live Process Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg:       #0a0c14;
    --panel:    #111520;
    --border:   #1e2540;
    --text:     #c8d0e8;
    --dim:      #4a5278;
    --pulse:    #00d4ff;
    --genesis:  #00ff88;
    --prune:    #ff4444;
    --diss:     #ffb300;
    --flux:     #c084fc;
    --dmn:      #2dd4bf;
    --decay:    #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 2px; color: #e2e8f8; }
  header h1 span { color: var(--pulse); }

  #ws-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--dim);
  }
  #ws-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--prune);
    transition: background .3s;
  }
  #ws-dot.connected   { background: var(--genesis); box-shadow: 0 0 6px var(--genesis); }
  #ws-dot.connecting  { background: var(--diss); animation: blink 1s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Body layout ─────────────────────────────────────────────── */
  .body-wrap {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Diagram pane ────────────────────────────────────────────── */
  #diagram-wrap {
    flex: 1;
    overflow: auto;
    padding: 20px;
    position: relative;
  }
  #loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; color: var(--dim); font-size: 13px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--pulse);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #diagram-container { opacity: 0; transition: opacity .4s; }
  #diagram-container.ready { opacity: 1; }
  #diagram-container svg { max-width: 100%; }

  /* ── Sidebar ─────────────────────────────────────────────────── */
  #sidebar {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--panel);
    overflow: hidden;
  }

  .sidebar-section {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
    font-weight: 600;
  }

  /* counters */
  #counters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .counter {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .counter .label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; }
  .counter .val   { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .counter.pulse  .val { color: var(--pulse); }
  .counter.genesis .val { color: var(--genesis); }
  .counter.prune  .val { color: var(--prune); }
  .counter.diss   .val { color: var(--diss); }
  .counter.flux   .val { color: var(--flux); }
  .counter.other  .val { color: var(--decay); }

  /* event log */
  #log-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #log-wrap::-webkit-scrollbar { width: 4px; }
  #log-wrap::-webkit-scrollbar-track { background: transparent; }
  #log-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    padding: 6px 14px;
    border-bottom: 1px solid #0f1322;
    font-size: 11px;
    line-height: 1.5;
    animation: slide-in .15s ease-out;
  }
  @keyframes slide-in { from { opacity:0; transform:translateX(6px); } }

  .log-entry .ts    { color: var(--dim); float: right; font-size: 10px; }
  .log-entry .type  { font-weight: 700; font-size: 10px; letter-spacing: .5px; }
  .log-entry .path  { color: var(--dim); margin-top: 1px; word-break: break-all; }

  .type-SYNAPTIC_PULSE   { color: var(--pulse); }
  .type-SYNAPTOGENESIS   { color: var(--genesis); }
  .type-SYNAPTIC_PRUNE   { color: var(--prune); }
  .type-DISSONANCE       { color: var(--diss); }
  .type-FLUX             { color: var(--flux); }
  .type-DEFAULT_MODE_PULSE { color: var(--dmn); }
  .type-SYNAPTIC_DECAY   { color: var(--decay); }

  /* ── SVG node highlight classes (injected dynamically) ────────── */
  .hl-pulse    rect, .hl-pulse    polygon { stroke: var(--pulse)   !important; stroke-width:3px!important; filter:drop-shadow(0 0 10px var(--pulse))   !important; }
  .hl-genesis  rect, .hl-genesis  polygon { stroke: var(--genesis) !important; stroke-width:3px!important; filter:drop-shadow(0 0 10px var(--genesis)) !important; }
  .hl-prune    rect, .hl-prune    polygon { stroke: var(--prune)   !important; stroke-width:3px!important; filter:drop-shadow(0 0 10px var(--prune))   !important; }
  .hl-diss     rect, .hl-diss     polygon { stroke: var(--diss)    !important; stroke-width:3px!important; filter:drop-shadow(0 0 10px var(--diss))    !important; }
  .hl-flux     rect, .hl-flux     polygon { stroke: var(--flux)    !important; stroke-width:3px!important; filter:drop-shadow(0 0 10px var(--flux))    !important; }
  .hl-dmn      rect, .hl-dmn      polygon { stroke: var(--dmn)     !important; stroke-width:3px!important; filter:drop-shadow(0 0 10px var(--dmn))     !important; }
  .hl-decay    rect, .hl-decay    polygon { stroke: var(--decay)   !important; stroke-width:3px!important; filter:drop-shadow(0 0 6px  var(--decay))   !important; }
</style>
</head>
<body>

<header>
  <h1>CEREBRUM <span>◈</span> Live Process Monitor</h1>
  <div id="ws-status">
    <div id="ws-dot"></div>
    <span id="ws-label">Disconnected</span>
    <span id="ws-url" style="color:#1e2540;margin-left:6px">ws://localhost:8765</span>
  </div>
</header>

<div class="body-wrap">
  <div id="diagram-wrap">
    <div id="loading"><div class="spinner"></div>Rendering diagram…</div>
    <div id="diagram-container"></div>
  </div>

  <div id="sidebar">
    <div class="sidebar-section">Live Events</div>
    <div id="counters">
      <div class="counter pulse">  <div class="label">Pulse</div>   <div class="val" id="c-pulse">0</div></div>
      <div class="counter genesis"><div class="label">Genesis</div> <div class="val" id="c-genesis">0</div></div>
      <div class="counter prune">  <div class="label">Prune</div>   <div class="val" id="c-prune">0</div></div>
      <div class="counter diss">   <div class="label">Dissonance</div><div class="val" id="c-diss">0</div></div>

const COUNTER_IDS = ['c-pulse','c-genesis','c-prune','c-diss','c-flux','c-other'];
const counts = {};

// ── Render Mermaid ─────────────────────────────────────────────────────────
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  darkMode: true,
  flowchart: { curve: 'basis', htmlLabels: true, useMaxWidth: false },
  themeVariables: {
    background: '#0a0c14', primaryColor: '#1a2035',
    primaryTextColor: '#c8d0e8', lineColor: '#2a3560',
    secondaryColor: '#111520', tertiaryColor: '#0d1022',
  },
});

async function renderDiagram() {
  try {
    const { svg } = await mermaid.render('cerebrum-diagram', DIAGRAM);
    const container = document.getElementById('diagram-container');
    container.innerHTML = svg;
    document.getElementById('loading').style.display = 'none';
    container.classList.add('ready');
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#ff4444">Render error: ${e.message}</div>`;
    console.error(e);
  }
}

renderDiagram();

// ── Node highlight helper ──────────────────────────────────────────────────
const activeTimers = {};

function highlightNodes(nodeIds, cls) {
  const svg = document.querySelector('#diagram-container svg');
  if (!svg) return;
  nodeIds.forEach(nodeId => {
    // Mermaid assigns IDs like "flowchart-BEAM-0", "flowchart-BEAM-1", etc.
    const els = svg.querySelectorAll(`[id^="flowchart-${nodeId}-"]`);
    // Also try without suffix for some Mermaid versions
    const els2 = svg.querySelectorAll(`[id="flowchart-${nodeId}"]`);
    const all = [...els, ...els2];

    all.forEach(el => {
      // Clear any pending removal for this node+class
      const key = `${nodeId}__${cls}`;
      if (activeTimers[key]) clearTimeout(activeTimers[key]);
      el.classList.add(cls);
      activeTimers[key] = setTimeout(() => el.classList.remove(cls), 2200);
    });
  });
}

// ── Log helper ────────────────────────────────────────────────────────────
const MAX_LOG = 200;
function addLog(evt) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-entry';
  const ts = new Date().toTimeString().slice(0,8);
  const type = evt.event_type || evt.type || 'UNKNOWN';
  const src  = evt.source || evt.data?.source || '';
  const tgt  = evt.target || evt.data?.target || '';
  const path = src && tgt ? `${src} → ${tgt}` : (src || tgt || '');
  div.innerHTML = `
    <span class="ts">${ts}</span>
    <div class="type type-${type}">${type}</div>
    ${path ? `<div class="path">${path}</div>` : ''}
  `;
  log.prepend(div);
  // Trim old entries
  while (log.children.length > MAX_LOG) log.removeChild(log.lastChild);
}

// ── Counter helper ────────────────────────────────────────────────────────
function bumpCounter(id) {
  counts[id] = (counts[id] || 0) + 1;
  const el = document.getElementById(id);
  if (el) {
    el.textContent = counts[id];
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────
const WS_URL = 'ws://localhost:8765';
let ws, reconnectTimer;

function setStatus(state, label) {
  const dot = document.getElementById('ws-dot');
  const lbl = document.getElementById('ws-label');
  dot.className = state;
  lbl.textContent = label;
}

function connect() {
  setStatus('connecting', 'Connecting…');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('connected', 'Connected');
    addLog({ event_type: '_SYSTEM', source: 'WebSocket connected to ' + WS_URL });
  };

  ws.onmessage = (msg) => {
    let evt;
    try { evt = JSON.parse(msg.data); } catch { return; }

    const type = (evt.event_type || evt.type || '').replace(/^NeuralEventType\./, '');
    evt.event_type = type;

    const mapping = EVENT_MAP[type];
    if (mapping) {
      highlightNodes(mapping.nodes, mapping.cls);
      bumpCounter(mapping.counter);
    } else {
      bumpCounter('c-other');
    }
    addLog(evt);
  };

  ws.onclose = () => {
    setStatus('', 'Disconnected — retrying in 3s…');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus('', 'Connection error');
  };
}

connect();

// ── Keyboard shortcut: R = force reconnect ────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    clearTimeout(reconnectTimer);
    if (ws) ws.close();
    connect();
  }
});
</script>
