        - text: Large language models hallucinate.
        - text: CEREBRUM shows its work.
      - paragraph [ref=e78]: Every response includes the complete edge chain — every hop, every relation, every score. You can verify any answer against the source data in seconds.
    - generic [ref=e81]:
      - paragraph [ref=e82]:
        - text: No labels. No training loop.
        - text: 56.8% H@1 out of the box.
      - paragraph [ref=e83]: Zero-config, zero tuning. Supervised systems like UniKGQA reach 99% H@1 on MetaQA — after training on thousands of labeled question-answer pairs from that exact dataset. CEREBRUM reaches 60.4% (tuned) or 56.8% (zero-config) on the same benchmark with no labels, no gradient descent, and no GPU cluster required. The retrieval gap is 88.3% H@10 — within 11 points of UniKGQA's top-1 accuracy, entirely training-free.
