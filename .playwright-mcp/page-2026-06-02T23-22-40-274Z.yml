      - paragraph [ref=e601]:
        - text: †
        - strong [ref=e602]: "Disclaimer:"
        - text: "\"Zero hallucinations\" and \"0% hallucination\" refer specifically to CEREBRUM's deterministic path traversal — every answer corresponds to a verifiable edge path in the ingested knowledge base. CEREBRUM cannot invent edges or entities that do not exist in the source data. This guarantee applies only to well-formed knowledge graphs; it does not cover errors or omissions in the underlying source data, entity resolution ambiguities, or natural-language query mismatches. Benchmark numbers reflect performance on MetaQA (Zhang et al., 2018) under the configurations described in"
        - link "BENCHMARK_CANONICAL.md" [ref=e603] [cursor=pointer]:
