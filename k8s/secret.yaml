# EXAMPLE ONLY — populate before applying.
# Never commit real secrets to git.
# Create with: kubectl create secret generic cerebrum-secrets -n cerebrum \
#   --from-literal=CEREBRUM_API_KEYS="key1,key2" \
#   --from-literal=CEREBRUM_ADMIN_KEY="your-admin-key"
apiVersion: v1
kind: Secret
metadata:
  name: cerebrum-secrets
  namespace: cerebrum
type: Opaque
stringData:
  CEREBRUM_API_KEYS: "change-me"
  CEREBRUM_ADMIN_KEY: "change-me-admin"
