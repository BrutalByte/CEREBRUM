          - heading "Experience-Dependent Graph Plasticity" [level=3] [ref=e395]
          - generic [ref=e396]: REM Engine
        - paragraph [ref=e397]: Relay nodes form automatically on frequently-traversed inter-community paths, mimicking synaptic long-term potentiation. First KG system where the graph itself strengthens the paths that work — no external agent required.
      - generic [ref=e398]:
        - generic [ref=e399]:
          - heading "Training-Free Abductive Reasoning" [level=3] [ref=e400]
          - generic [ref=e401]: HypothesisEngine
        - paragraph [ref=e402]: Given an effect, infer the most plausible cause via multi-path reverse traversal with Noisy-OR path fusion — entirely without training data. Prior abductive KG work requires trained neural models; CEREBRUM uses graph structure alone.
