<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>

  <!-- Graph edges -->
  <line x1="32" y1="14" x2="18" y2="32" stroke="#6366f1" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="14" x2="46" y2="32" stroke="#6366f1" stroke-width="1.2" opacity="0.5"/>
  <line x1="18" y1="32" x2="28" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="46" y1="32" x2="28" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="18" y1="32" x2="46" y2="32" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Graph nodes -->
  <!-- Top node (query) -->
  <circle cx="32" cy="14" r="5" fill="#6366f1" opacity="0.9"/>
  <!-- Left node -->
  <circle cx="18" cy="32" r="4" fill="#6366f1" opacity="0.7"/>
  <!-- Right node -->
  <circle cx="46" cy="32" r="4" fill="#6366f1" opacity="0.7"/>
  <!-- Bottom answer node — cyan highlight -->
  <circle cx="28" cy="50" r="5.5" fill="url(#nodeGrad)" opacity="1"/>
  <circle cx="28" cy="50" r="3" fill="#22d3ee" opacity="0.9"/>
</svg>
